<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links - DevOps</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 580px;
            text-align: center;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }
        .bio {
            color: #aaaaaa;
            font-size: 15px;
            margin-bottom: 35px;
        }
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1c1c1c;
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            border: 1px solid #333333;
            transition: background-color 0.2s, transform 0.2s;
        }
        .btn-link:hover {
            background-color: #2a2a2a;
            transform: scale(1.01);
        }
        .icon {
            margin-right: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <img class="profile-img" src="https://avatars.githubusercontent.com/u/178576440?v=4&size=64" alt="Foto de Perfil">
    
    <h1>Pedro Henrique Bergmann</h1>
    <p class="bio">...</p>

    <a href="#" target="_blank" class="btn-link">
        <span class="icon">📸</span> Instagram
    </a>

    <a href="#" target="_blank" class="btn-link">
        <span class="icon">💼📄</span> Currículo
    </a>

    <a href="#" target="_blank" class="btn-link">
        <span class="icon">💻</span> GitHub Portfolio
    </a>

    <a href="#" target="_blank" class="btn-link">
        <span class="icon">🦤</span> Twitter / X
    </a>

    <a href="#" target="_blank" class="btn-link">
        <span class="icon">✉️</span> Contact Me
    </a>
</div>

</body>
</html>
